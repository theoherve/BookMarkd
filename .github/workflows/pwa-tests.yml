name: PWA Tests & Lighthouse

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "public/manifest.webmanifest"
      - "public/sw.js"
      - "public/workbox-*.js"
      - "tests/e2e/pwa-*.spec.ts"
      - "next.config.*"
      - "playwright.config.ts"
      - "scripts/lighthouse-pwa.ts"
      - "scripts/generate-pwa-icons.ts"
      - ".github/workflows/pwa-tests.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches: [main, develop]
    paths:
      - "public/manifest.webmanifest"
      - "public/sw.js"
      - "public/workbox-*.js"
      - "tests/e2e/pwa-*.spec.ts"
      - "next.config.*"
      - "playwright.config.ts"
      - "scripts/lighthouse-pwa.ts"
      - "scripts/generate-pwa-icons.ts"
      - ".github/workflows/pwa-tests.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: pwa-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse PWA Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: false

      - name: Build application
        run: pnpm build
        env:
          NODE_ENV: production
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXTAUTH_SECRET: placeholder-nextauth-secret-for-ci-build
          NEXTAUTH_URL: http://localhost:3000

      - name: Start server
        run: pnpm start &
        env:
          PORT: 3000
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXTAUTH_SECRET: placeholder-nextauth-secret-for-ci-build
          NEXTAUTH_URL: http://localhost:3000

      - name: Wait for server
        run: |
          timeout=60
          elapsed=0
          while ! curl -f http://localhost:3000 > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "Server failed to start within $timeout seconds"
              exit 1
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "Server is ready"

      - name: Run Lighthouse PWA audit
        run: pnpm lighthouse:pwa
        env:
          LIGHTHOUSE_BASE_URL: http://localhost:3000

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 7

  playwright:
    name: Playwright PWA Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: false

      - name: Get Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm playwright:install --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: Build application
        run: pnpm build
        env:
          NODE_ENV: production
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXTAUTH_SECRET: placeholder-nextauth-secret-for-ci-build
          NEXTAUTH_URL: http://localhost:3000

      - name: Start server
        run: pnpm start &
        env:
          PORT: 3000
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXTAUTH_SECRET: placeholder-nextauth-secret-for-ci-build
          NEXTAUTH_URL: http://localhost:3000

      - name: Wait for server
        run: |
          timeout=60
          elapsed=0
          while ! curl -f http://localhost:3000 > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "Server failed to start within $timeout seconds"
              exit 1
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "Server is ready"

      - name: Run PWA tests
        run: pnpm test:pwa
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

